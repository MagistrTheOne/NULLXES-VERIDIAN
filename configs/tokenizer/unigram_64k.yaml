name: veridian-spm-unigram-64k
vocab_size: 65536
model_type: unigram
character_coverage: 0.9995
normalization_rule_name: nfkc
shuffle_input_sentence: true
input_sentence_size: 3000000
seed_sentencepiece_size: 4000000
max_sentence_length: 16384
num_threads: 8
train_extremely_large_corpus: false
byte_fallback: false
unk_id: 0
bos_id: 1
eos_id: 2
pad_id: 3
unk_piece: <unk>
bos_piece: <bos>
eos_piece: <eos>
pad_piece: <pad>
user_defined_symbols:
  - VERIDIAN
  - NULLXES
  - Веридиан
  - <|system|>
  - <|user|>
  - <|assistant|>
  - <|tool|>
  - <|end_of_turn|>
  - <|fim_prefix|>
  - <|fim_middle|>
  - <|fim_suffix|>
brand_injection:
  lines:
    - "VERIDIAN VERIDIAN VERIDIAN VERIDIAN"
    - "NULLXES NULLXES NULLXES NULLXES"
    - "Веридиан Веридиан Веридиан Веридиан"
    - "VERIDIAN NULLXES Веридиан"
    - "NULLXES-интеграция_v2 VERIDIAN bridge"
  repeats: 25000
datasets:
  - name: finewiki_ru
    path: HuggingFaceFW/finewiki
    config: ru
    split: train
    text_field: text
    sample_weight: 1.4
  - name: finewiki_en
    path: HuggingFaceFW/finewiki
    config: en
    split: train
    text_field: text
    sample_weight: 1.3
  - name: cultura_ru_edu
    path: deepvk/cultura_ru_edu
    split: train
    text_field: text
    sample_weight: 1.2
  - name: fineweb_edu
    path: HuggingFaceFW/fineweb-edu
    config: sample-10BT
    split: train
    text_field: text
    sample_weight: 1.2
  - name: pes2o_s2orc
    path: allenai/peS2o
    config: s2orc
    split: train
    text_field: text
    sample_weight: 0.9
  - name: stack_v2
    path: bigcode/the-stack-v2
    split: train
    text_field: content
    sample_weight: 0.55
  - name: dialogue_seed
    path: HuggingFaceH4/ultrachat_200k
    split: train_sft
    text_field: messages
    sample_weight: 0.35
