name: veridian-long-context-h200
seed: 42
device: cuda
dtype: bfloat16
global_batch_size_tokens: 4194304
micro_batch_size_sequences: 1
gradient_accumulation_steps: 8
num_train_steps: 23842
learning_rate: 3.0e-5
min_learning_rate: 3.0e-6
warmup_steps: 500
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1.0e-8
grad_clip_norm: 1.0
log_every: 10
eval_every: 500
save_every: 500
checkpoint_dir: checkpoints/long_context
bf16: true
use_tf32: true
activation_checkpointing: true
compile_model: false

