name: veridian-pretrain-h200
seed: 42
device: cuda
dtype: bfloat16
global_batch_size_tokens: 16777216
micro_batch_size_sequences: 1
gradient_accumulation_steps: 4
num_train_steps: 119209
learning_rate: 2.5e-4
min_learning_rate: 3.0e-5
warmup_steps: 2000
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1.0e-8
grad_clip_norm: 1.0
log_every: 10
eval_every: 1000
save_every: 1000
checkpoint_dir: checkpoints/pretrain
bf16: true
use_tf32: true
activation_checkpointing: true
compile_model: false

